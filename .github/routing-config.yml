routes:

  ai_research:
    intent: [research, summarize, explain, "what is", "find info on"]
    destination: PopeBot (Groq/Railway)
    endpoint: "https://thepopebot-production-e881.up.railway.app/api/chat"
    status: confirmed

  publication_writing:
    intent: ["write an article", "draft a post", pitch, blog]
    destination: Elite Writer
    endpoint: TBD  # app confirmed, production URL pending
    status: tbd

  ai_platform:
    intent: [polsia, "AI API", "model endpoint"]
    destination: Polsia (Railway)
    endpoint: "https://polsia-production.up.railway.app"
    status: confirmed

  task_management:
    intent: ["add task", "create task", "update priority", blocked]
    destination: ClickUp MCP
    endpoint: "mcp://clickup"
    status: active

  knowledge_base:
    intent: ["add to KB", "knowledge base", ingest, "save to knowledge"]
    destination: Nextra + Neon
    endpoint: "https://knowledge-base-nextra.vercel.app"
    status: unverified

  code_deploy:
    intent: ["push to github", deploy, "fix the build", "update code"]
    destination: GitHub + Vercel MCPs
    endpoint: "mcp://github + mcp://vercel"
    status: active

  command_center:
    intent: [dashboard, "mission control", "project status"]
    destination: Command Center
    endpoint: "https://command.insightprofit.live"
    status: active

  marketing_funnels:
    intent: [funnel, checkout, GHL, "order form"]
    destination: Go High Level
    endpoint: "mcp://ghl"
    status: active

  ecommerce:
    intent: [shopify, "family gift studio", FGS, POD]
    destination: Family Gift Studio (Shopify)
    storefront: "https://familygiftstudio.com"
    admin: "https://familydesignstudio.myshopify.com/admin"
    api_token_ref: "SHOPIFY_FGS_TOKEN (shpat_cbaf3d37... — see Notion KEYS)"
    status: confirmed  # 2026-04-13

  video_content:
    intent: [video, vidrevamp, youtube, "viral hook"]
    destination: VidRevamp
    endpoint: "https://vidrevamp.vercel.app"
    status: unverified

  aviation:
    intent: [aviation, pilot, FAA, cargo, flight, propel]
    destination: Notion KB (aviation)
    endpoint: "mcp://notion"
    status: active

  daily_briefing:
    intent: ["morning briefing", "what's happening", "daily brief"]
    destination: Chief of Staff (GitHub Actions)
    endpoint: "GitHub Actions dispatch on knowledge-base-nextra"
    status: active
