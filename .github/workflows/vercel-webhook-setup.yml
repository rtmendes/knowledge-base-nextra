# ============================================================
# Vercel Webhook Registration Guide
# ============================================================
#
# This workflow does NOT run automatically — it serves as
# the canonical reference for how to register the auto-triage
# webhook URL in Vercel and set required environment variables.
#
# STEP 1 — Set CLICKUP_API_KEY in Vercel
# ─────────────────────────────────────
# In Vercel Dashboard → knowledge-base-nextra → Settings → Environment Variables
# Add:
#   Name:  CLICKUP_API_KEY
#   Value: <your ClickUp API key>
#   Environments: Production, Preview, Development
#
# STEP 2 — Register the Webhook in Vercel
# ────────────────────────────────────────
# Vercel Dashboard → (Team) Settings → Webhooks → Add Webhook
#   URL:    https://knowledge-base-nextra.vercel.app/api/webhooks/vercel
#   Events: deployment.error  (check this box only)
#   Click:  Create Webhook
#
# STEP 3 — Test the Webhook (curl)
# ─────────────────────────────────
# curl -X POST https://knowledge-base-nextra.vercel.app/api/webhooks/vercel \
#   -H "Content-Type: application/json" \
#   -d '{
#     "type": "deployment.error",
#     "payload": {
#       "deployment": {
#         "id": "dpl_test123",
#         "name": "knowledge-base-nextra",
#         "url": "knowledge-base-nextra.vercel.app",
#         "state": "ERROR",
#         "errorCode": "BUILD_FAILED",
#         "errorMessage": "Module not found: Cannot resolve react",
#         "meta": {
#           "githubCommitRef": "main",
#           "githubCommitMessage": "test: trigger auto-triage"
#         }
#       },
#       "project": { "name": "knowledge-base-nextra" },
#       "target": "production",
#       "links": {
#         "deployment": "https://vercel.com/rtmendes/knowledge-base-nextra/dpl_test123"
#       }
#     }
#   }'
#
# Expected response:
#   {"ok":true,"project":"knowledge-base-nextra","deploymentId":"dpl_test123",
#    "clickupTaskId":"<task-id>","diagnosis":"<AI diagnosis>"}
#
# STEP 4 — Revenue-Critical Priority Rules
# ─────────────────────────────────────────
# Projects whose names contain "polsia" or "command-center" get:
#   - ClickUp priority: URGENT (1)
#   - Due date: 2 hours from failure
# All other projects get:
#   - ClickUp priority: NORMAL (3)
#   - Due date: 24 hours from failure
#
# STEP 5 — Neon DB Logging (optional)
# ─────────────────────────────────────
# To enable logging to command_center.agent_runs, add pg to the project:
#   npm install pg @types/pg
# Then add to Vercel env vars:
#   DATABASE_URL = postgresql://neondb_owner:...@ep-sweet-mountain-...neon.tech/neondb?sslmode=require
# The table is auto-created on first run (CREATE TABLE IF NOT EXISTS).
#
# ============================================================

name: vercel-webhook-setup

on:
  workflow_dispatch:
    inputs:
      verify_endpoint:
        description: 'Run a live health-check against the webhook endpoint'
        required: false
        default: 'true'

jobs:
  verify-webhook-endpoint:
    name: Verify Webhook Endpoint
    runs-on: ubuntu-latest
    if: ${{ github.event.inputs.verify_endpoint == 'true' }}

    steps:
      - name: Health-check GET /api/webhooks/vercel
        run: |
          echo "Checking webhook endpoint health..."
          RESPONSE=$(curl -sf https://knowledge-base-nextra.vercel.app/api/webhooks/vercel)
          echo "Response: $RESPONSE"
          echo "$RESPONSE" | python3 -c "
          import sys, json
          d = json.load(sys.stdin)
          assert d.get('ok') == True, f'Expected ok=true, got: {d}'
          print('✅ Webhook endpoint is healthy')
          print(f'   Version:     {d.get(\"version\")}')
          print(f'   Description: {d.get(\"description\")}')
          "

      - name: Send test deployment.error event
        env:
          # Set CLICKUP_API_KEY as a GitHub secret: Settings → Secrets → Actions
          CLICKUP_API_KEY: ${{ secrets.CLICKUP_API_KEY }}
        run: |
          echo "Sending test deployment.error payload..."
          RESPONSE=$(curl -sf -X POST \
            https://knowledge-base-nextra.vercel.app/api/webhooks/vercel \
            -H "Content-Type: application/json" \
            -d '{
              "type": "deployment.error",
              "payload": {
                "deployment": {
                  "id": "dpl_citest_${{ github.run_id }}",
                  "name": "knowledge-base-nextra",
                  "state": "ERROR",
                  "errorCode": "BUILD_FAILED",
                  "errorMessage": "CI test — Module not found",
                  "meta": {
                    "githubCommitRef": "main",
                    "githubCommitMessage": "CI verification run"
                  }
                },
                "project": { "name": "knowledge-base-nextra" },
                "target": "production",
                "links": {
                  "deployment": "https://vercel.com/rtmendes/knowledge-base-nextra/dpl_citest"
                }
              }
            }')
          echo "Response: $RESPONSE"
          echo "$RESPONSE" | python3 -c "
          import sys, json
          d = json.load(sys.stdin)
          assert d.get('ok') == True, f'Webhook returned error: {d}'
          print('✅ Webhook processed successfully')
          print(f'   Project:    {d.get(\"project\")}')
          print(f'   ClickUp ID: {d.get(\"clickupTaskId\")}')
          print(f'   Diagnosis:  {d.get(\"diagnosis\")}')
          "
