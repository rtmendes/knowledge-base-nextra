name: Weekly Project Status Report

on:
  schedule:
    - cron: '0 14 * * 1'   # Monday 9am EST (UTC-5) = 14:00 UTC
  workflow_dispatch:

jobs:
  report:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: scripts/package-lock.json

      - name: Install dependencies
        run: cd scripts && npm ci

      - name: Run weekly status report
        run: node scripts/weekly-report.js
        env:
          NOTION_API_KEY: ${{ secrets.NOTION_API_TOKEN }}
          NEON_DATABASE_URL: ${{ secrets.NEON_DATABASE_URL }}
          NOTION_WEEKLY_REPORT_PARENT_ID: ${{ secrets.NOTION_WEEKLY_REPORT_PAGE_ID }}
          CLICKUP_API_KEY: ${{ secrets.CLICKUP_API_KEY }}
          CLICKUP_WORKSPACE_ID: '14233858'
