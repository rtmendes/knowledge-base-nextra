name: "Pack and Host Chrome Extension"

on:
  push:
    branches: [main]
    paths:
      - "chrome-extension/**"
      - "scripts/pack-crx.js"
      - ".github/workflows/pack-extension.yml"
  workflow_dispatch:

jobs:
  pack:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Read extension version
        id: version
        run: |
          VERSION=$(python3 -c "import json; print(json.load(open('chrome-extension/manifest.json'))['version'])")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Packing extension v$VERSION"

      - name: Install crx3 library
        run: npm install crx3

      - name: Write signing key
        env:
          EXTENSION_KEY_B64: ${{ secrets.EXTENSION_KEY_B64 }}
        run: |
          if [ -n "$EXTENSION_KEY_B64" ]; then
            echo "$EXTENSION_KEY_B64" | base64 -d > /tmp/extension.pem
            echo "Using stored signing key"
          else
            openssl genrsa 2048 > /tmp/extension.pem 2>/dev/null
            echo "Generated temporary signing key"
          fi
          ls -la /tmp/extension.pem
          echo "Key file size: $(wc -c < /tmp/extension.pem) bytes"

      - name: Debug environment
        run: |
          echo "Node version: $(node --version)"
          echo "NPM version: $(npm --version)"
          echo "Working directory: $(pwd)"
          echo "---"
          echo "Extension dir contents:"
          ls -la chrome-extension/
          echo "---"
          echo "manifest.json:"
          cat chrome-extension/manifest.json
          echo "---"
          echo "node_modules/crx3 exists: $(test -d node_modules/crx3 && echo YES || echo NO)"
          echo "scripts/package.json type:"
          cat scripts/package.json | python3 -c "import sys,json; print(json.load(sys.stdin).get('type','not set'))"
          echo "---"
          echo "Output dir exists: $(test -d public/extension && echo YES || echo NO)"
          mkdir -p public/extension
          echo "Key file valid: $(openssl rsa -in /tmp/extension.pem -check -noout 2>&1)"

      - name: Pack extension
        run: |
          cd $GITHUB_WORKSPACE
          node scripts/pack-crx.js 2>&1 || {
            echo "--- FALLBACK: trying with .cjs rename ---"
            cp scripts/pack-crx.js scripts/pack-crx.cjs
            node scripts/pack-crx.cjs 2>&1
          }
        env:
          CRX_KEY_PATH: /tmp/extension.pem
          CRX_OUT_PATH: public/extension/genspark-kb-extractor.crx
          EXT_DIR: chrome-extension

      - name: Write update manifest
        env:
          VERSION: ${{ steps.version.outputs.version }}
          EXTENSION_ID: ${{ vars.EXTENSION_ID }}
        run: |
          EXT_ID="${EXTENSION_ID:-YOUR_EXTENSION_ID_HERE}"
          cat > public/extension/updates.xml << XMLEOF
          <?xml version='1.0' encoding='UTF-8'?>
          <gupdate xmlns='http://www.google.com/update2/response' protocol='2.0'>
            <app appid='${EXT_ID}'>
              <updatecheck
                codebase='https://kb.insightprofit.live/extension/genspark-kb-extractor.crx'
                version='${VERSION}'/>
            </app>
          </gupdate>
          XMLEOF
          echo "updates.xml written"
          cat public/extension/updates.xml

      - name: Commit extension files
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/extension/
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "ci: pack extension v${VERSION} [skip ci]"
            git push
            echo "Extension files committed and pushed"
          fi
