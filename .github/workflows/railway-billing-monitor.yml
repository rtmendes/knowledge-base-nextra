name: Railway Billing Monitor

on:
  schedule:
    - cron: '0 13 * * *'  # 8am EST daily
  workflow_dispatch:

jobs:
  check-railway-usage:
    runs-on: ubuntu-latest
    steps:
      - name: Check Railway Usage & Alert
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
          CLICKUP_API_KEY: ${{ secrets.CLICKUP_API_KEY }}
        run: |
          # Query Railway GraphQL API for usage
          RESPONSE=$(curl -s -X POST https://backboard.railway.app/graphql/v2 \
            -H "Authorization: Bearer $RAILWAY_TOKEN" \
            -H "Content-Type: application/json" \
            -d '{"query": "{ me { usage { estimatedUsage } subscriptions { edges { node { plan name } } } } }"}')
          
          echo "Railway response: $RESPONSE"
          
          # Extract estimated usage (in cents)
          USAGE=$(echo $RESPONSE | python3 -c "import sys,json; data=json.load(sys.stdin); print(data.get('data',{}).get('me',{}).get('usage',{}).get('estimatedUsage', 0))" 2>/dev/null || echo "0")
          
          echo "Current usage: $USAGE cents"
          
          # Alert if usage exceeds 400 cents ($4.00) - warning before $5 limit
          if [ "$USAGE" -gt 400 ] 2>/dev/null; then
            echo "⚠️ Railway usage at $USAGE cents - approaching $5 limit!"
            
            # Create ClickUp task in Blocked list
            curl -s -X POST "https://api.clickup.com/api/v2/list/901712867639/task" \
              -H "Authorization: $CLICKUP_API_KEY" \
              -H "Content-Type: application/json" \
              -d "{
                \"name\": \"⚠️ Railway credits almost exhausted ($USAGE/500 cents used)\",
                \"description\": \"Railway usage is at $USAGE cents out of 500 cent limit. Upgrade to Hobby plan (\$5/month) to prevent service outage. Services at risk: PopeBot, command.insightprofit.live\",
                \"priority\": 1,
                \"status\": \"to do\"
              }"
            echo "ClickUp alert created!"
          else
            echo "✅ Railway usage OK: $USAGE/500 cents"
          fi
