name: Deploy to Vercel
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install Vercel CLI
        run: npm install -g vercel@latest
      - name: Deploy to Vercel
        run: vercel --prod --yes --token=${{ secrets.VERCEL_TOKEN }} --scope=team_RDc9rfG2nyUydjZvco8L06C9
        env:
          VERCEL_ORG_ID: team_RDc9rfG2nyUydjZvco8L06C9
          VERCEL_PROJECT_ID: prj_kmVj9XsYQykbBzXCrMnMDNWvmvI1
